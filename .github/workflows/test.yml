name: Tests

on:
  push:
    branches: [main]
    paths-ignore: ["**/*.md", docs/**]
  pull_request:
    branches: [main]
    paths-ignore: ["**/*.md", docs/**]
  workflow_dispatch:
  workflow_call:

permissions:
  contents: read

jobs:
  test:
    # prevent this action from running on forks
    if: github.repository == 'ab5424/agility'
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        version:
          - { python: "3.10", resolution: lowest-direct, extra: "tests,ovito,ase,pymatgen" }
          - { python: "3.14", resolution: highest, extra: "tests,ovito,ase,pymatgen" }
        # Add macOS without optional dependencies, running only on python 3.12
        include:
          - os: macos-latest
            version: { python: "3.12", resolution: highest, extra: "tests,strict" }

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v6
      - name: Set up Python ${{ matrix.version.python }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.version.python }}
          cache: pip
      - name: Install dependencies
        run: |
          pip install uv
          uv pip install -e .[${{ matrix.version.extra }}] --resolution=${{ matrix.version.resolution }} --system
      # Fix ImportError: libEGL.so.1: ...
      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update && sudo apt-get install -y libegl1-mesa-dev lammps python3-lammps
      # Expose the apt-installed LAMMPS Python bindings (pure-Python ctypes module)
      # to the test runner regardless of the Python version used by setup-python.
      - name: Add LAMMPS Python bindings to PYTHONPATH
        if: runner.os == 'Linux'
        # ${PYTHONPATH:+:$PYTHONPATH} appends the existing PYTHONPATH (with a colon separator)
        # only when PYTHONPATH is already set, avoiding a leading colon when it is empty.
        run: echo "PYTHONPATH=/usr/lib/python3/dist-packages${PYTHONPATH:+:$PYTHONPATH}" >> "$GITHUB_ENV"
      - name: pytest
        run: |
          pytest --cov=agility --cov-report=xml tests
      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@v5
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
