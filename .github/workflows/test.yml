name: Tests

on:
  push:
    branches: [main]
    paths-ignore: ["**/*.md", docs/**]
  pull_request:
    branches: [main]
    paths-ignore: ["**/*.md", docs/**]
  workflow_dispatch:
  workflow_call:

permissions:
  contents: read

jobs:
  test:
    # prevent this action from running on forks
    if: github.repository == 'ab5424/agility'
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        version:
          - { python: "3.10", resolution: lowest-direct, extra: "tests,ovito,ase,pymatgen" }
          - { python: "3.14", resolution: highest, extra: "tests,ovito,ase,pymatgen" }
        # Add macOS without optional dependencies, running only on python 3.12
        include:
          - os: macos-latest
            version: { python: "3.12", resolution: highest, extra: "tests,strict" }

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v6
      - name: Set up Python ${{ matrix.version.python }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.version.python }}
          cache: pip
      - name: Install dependencies
        run: |
          pip install uv
          uv pip install -e .[${{ matrix.version.extra }}] --resolution=${{ matrix.version.resolution }} --system
      # Fix ImportError: libEGL.so.1: ...
      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update && sudo apt-get install -y libegl1-mesa-dev gfortran liblapack-dev
      # The apt-installed LAMMPS Python bindings are compiled for the system Python.
      # Loading them under a different Python version (e.g. 3.10) causes a segfault,
      # so only install and expose them when the runner Python matches the system Python.
      - name: Install LAMMPS and Python bindings
        if: runner.os == 'Linux' && matrix.version.python != '3.10'
        run: |
          sudo apt-get install -y lammps python3-lammps
          # Copy only the lammps Python package to an isolated directory so that the
          # system mpi4py (compiled for the system Python, not the test runner) is NOT
          # exposed via PYTHONPATH.  Without a visible mpi4py, lammps sets has_mpi4py=False
          # and skips the MPI communicator setup that would otherwise raise ImportError.
          mkdir -p /tmp/lammps-bindings
          cp -r /usr/lib/python3/dist-packages/lammps /tmp/lammps-bindings/
      - name: Build and install atomsk from source
        if: runner.os == 'Linux'
        run: |
          git clone https://github.com/pierrehirel/atomsk.git /tmp/atomsk-src
          # git -C /tmp/atomsk-src checkout c76753f62b784a36956f1b436943750458d1516b
          make -C /tmp/atomsk-src/src atomsk
          sudo install -m 0755 /tmp/atomsk-src/src/atomsk /usr/local/bin/atomsk
      - name: Verify atomsk availability for integration tests
        if: runner.os == 'Linux'
        run: |
          command -v atomsk
          python -c "from agility.polycrystal import find_atomsk; assert find_atomsk() is not None, 'atomsk not available on PATH'"
      # Expose the apt-installed LAMMPS Python bindings (pure-Python ctypes module)
      # to the test runner regardless of the Python version used by setup-python.
      # Skipped on Python 3.10 where the system bindings cause a segfault.
      - name: Add LAMMPS Python bindings to PYTHONPATH
        if: runner.os == 'Linux' && matrix.version.python != '3.10'
        run: echo "PYTHONPATH=/tmp/lammps-bindings${PYTHONPATH:+:$PYTHONPATH}" >> "$GITHUB_ENV"
      - name: pytest
        run: |
          pytest --cov=agility --cov-report=xml tests
      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@v5
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
